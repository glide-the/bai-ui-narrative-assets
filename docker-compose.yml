services:
  # PostgreSQL for data persistence
  postgres:
    image: postgres:16-alpine
    container_name: nationality-postgres
    environment:
      POSTGRES_USER: nationality
      POSTGRES_PASSWORD: nationality
      POSTGRES_DB: nationality
    ports:
      - "5433:5432"
    volumes:
      - nationality_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nationality"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible file storage
  minio:
    image: minio/minio:latest
    container_name: nationality-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - nationality_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO client to create bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: nationality-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/vibesales --ignore-existing;
      mc anonymous set public myminio/vibesales;
      echo 'MinIO bucket vibesales created and set to public';
      exit 0;
      "

volumes:
  nationality_postgres_data:
  nationality_minio_data: